[fossil_branch]
symbol = " ΎΡα "
format = '[$symbol($version)]($style)'

[git_branch]
symbol = "ΌεΓ "
style = "fg:cinza_medio"
format = '[$symbol($branch) ($version)]($style)'

[git_commit]
tag_symbol = ' ΎΡΤ '
format = '[$symbol($version)]($style)'

[python]
format = '[(\($virtualenv\) )](fg:cinza_medio)'
