palette = "cores"

format = """ 
[έΨΙ](fg:blue)\
$os\
[ΌΓ░](bg:white fg:blue)\
$username\
[ΌΓ░](bg:cinza_escuro fg:white)\
$directory\
[ΌΓ░ ](fg:cinza_escuro)\
$git_branch\
$git_status\
$python\
($cmd_duration )\
$character"""

[line_break]
disabled = true

[palettes.cores]
cinza_escuro = "#444444"
cinza_fechado = "#9CA4B5"
cinza_medio = "#BAC3CF"

[username]
show_always = true
format = '[ $user](bg:white fg:black)'
disabled = false

